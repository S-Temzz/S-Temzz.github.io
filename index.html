<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mazoe Orange Crush Ad</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #ff7b00, #ffb347);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .ad-container{
      width: 900px;
      height: 500px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:50px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      position:relative;
    }

    .text-section{
      width:50%;
      color:white;
      z-index:2;
    }

    .brand{
      font-size:22px;
      font-weight:bold;
      letter-spacing:2px;
      margin-bottom:10px;
    }

    h1{
      font-size:64px;
      line-height:1;
      margin-bottom:20px;
      text-transform:uppercase;
    }

    .tagline{
      font-size:22px;
      margin-bottom:30px;
      color:#fff8e8;
    }

    .btn{
      display:inline-block;
      padding:15px 35px;
      background:white;
      color:#ff7b00;
      text-decoration:none;
      border-radius:40px;
      font-weight:bold;
      transition:0.3s ease;
    }

    .btn:hover{
      background:#ffe0b3;
      transform:scale(1.05);
    }

    .image-section{
      width:45%;
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .bottle{
      width:260px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.35));
    }

    .orange{
      position:absolute;
      width:120px;
      opacity:0.9;
      animation: spin 10s linear infinite;
    }

    .orange1{
      top:-20px;
      right:20px;
    }

    .orange2{
      bottom:-30px;
      left:0;
    }

    @keyframes float{
      0%,100%{
        transform: translateY(0);
      }
      50%{
        transform: translateY(-15px);
      }
    }

    @keyframes spin{
      from{
        transform: rotate(0deg);
      }
      to{
        transform: rotate(360deg);
      }
    }

    .splash{
      position:absolute;
      width:700px;
      height:700px;
      background: rgba(255,255,255,0.08);
      border-radius:50%;
      top:-250px;
      right:-250px;
    }

  </style>
</head>
<body>

  <div class="ad-container">

    <div class="splash"></div>

    <div class="text-section">
      <div class="brand">MAZOE</div>
      <h1>Orange<br>Crush</h1>
      <p class="tagline">
        Refresh your day with the bold citrus taste everyone loves!
      </p>

      <a href="#" class="btn">Taste the Crush</a>
    </div>

    <div class="image-section">
      <!-- Replace with actual Mazoe bottle image -->
      <img 
        class="bottle"
        src="https://upload.wikimedia.org/wikipedia/commons/3/36/Orange_juice_icon.png"
        alt="Mazoe Orange Crush"
      >

      <img 
        class="orange orange1"
        src="https://upload.wikimedia.org/wikipedia/commons/c/c4/Orange-Fruit-Pieces.png"
        alt="orange"
      >

      <img 
        class="orange orange2"
        src="https://upload.wikimedia.org/wikipedia/commons/c/c4/Orange-Fruit-Pieces.png"
        alt="orange"
      >
    </div>

  </div>

</body>
</html>
